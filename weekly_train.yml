name: Weekly model retrain

on:
  schedule:
    # 23:00 UTC Saturday = 04:30 AM IST Sunday (market closed, safe heavy window)
    - cron: "0 23 * * 6"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly training (full backtest + ML retrain)
        run: python scripts/train_model.py

      - name: Commit updated model + watchlist
        run: |
          git config user.name "nse-scanner-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data/model.pkl docs/data/watchlist.json
          git diff --cached --quiet || git commit -m "Weekly retrain $(date -u +%F)"
          git push
